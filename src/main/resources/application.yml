# ============================================================
# 공통 설정 (모든 profile 공유)
# - profile 별 DB 접속은 application-{profile}.yml 참고
# - 활성 profile: 환경변수 SPRING_PROFILES_ACTIVE (미지정 시 local)
# ============================================================
spring:
  application:
    name: ysk-asan
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
  servlet:
    multipart:
      # CSV 가져오기 업로드 한도(텍스트 5천 행이면 충분)
      max-file-size: 2MB
      max-request-size: 2MB

server:
  port: ${SERVER_PORT:8181}   # WAS 포트

# 로그인 유지(Remember-Me) 토큰 서명 키. 로컬 기본값 제공, 운영은 환경변수 REMEMBER_ME_KEY 필수(application-prod).
remember-me:
  key: ${REMEMBER_ME_KEY:local-dev-remember-me-key}
  secure-cookie: false        # http 로컬: false. 운영(https)은 application-prod 에서 true

app:
  # 부트스트랩 관리자: 지정 계정을 기동 시 승인+ADMIN+잠금해제(멱등). 빈값이면 스킵.
  # 최초 관리자 지정(닭-달걀) 및 관리자 전원 잠금 시 break-glass 용도.
  bootstrap-admin: ${APP_BOOTSTRAP_ADMIN:}
